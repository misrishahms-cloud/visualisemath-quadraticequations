<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisualiseMath.QuadraticEquations - Quadratic Visualizer</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 40px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .inputs {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .input-box {
      flex: 1;
      min-width: 150px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      background: #334155;
      color: white;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }

    .equation {
      text-align: center;
      font-size: 1.5rem;
      margin: 25px 0;
      color: #38bdf8;
    }

    canvas {
      background: white;
      border-radius: 15px;
      padding: 10px;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      color: #94a3b8;
    }
  </style>

</head>

<body>

  <div class="container">

```
<h1>VisualiseMath.QuadraticEquations</h1>

<div class="subtitle">
  Interactive Quadratic Equation Visualizer
</div>

<div class="card">

  <div class="inputs">

    <div class="input-box">
      <label>Value of a</label>
      <input type="number" id="aInput" value="1" step="any">
    </div>

    <div class="input-box">
      <label>Value of b</label>
      <input type="number" id="bInput" value="0" step="any">
    </div>

    <div class="input-box">
      <label>Value of c</label>
      <input type="number" id="cInput" value="0" step="any">
    </div>

  </div>

  <button onclick="drawGraph()">
    Plot Graph
  </button>

  <div class="equation" id="equation">
    y = 1x² + 0x + 0
  </div>

  <canvas id="graph"></canvas>

</div>

<div class="footer">
  Built by Misri Shah • VisualiseMath.QuadraticEquations
</div>
```

  </div>

  <script>

    const ctx = document.getElementById('graph').getContext('2d');

    let chart;

    function generatePoints(a, b, c) {

      let points = [];

      for(let x = -20; x <= 20; x += 0.1) {

        let y = a*x*x + b*x + c;

        points.push({
          x: x,
          y: y
        });

      }

      return points;
    }

    function drawGraph() {

      let a = parseFloat(document.getElementById('aInput').value);
      let b = parseFloat(document.getElementById('bInput').value);
      let c = parseFloat(document.getElementById('cInput').value);

      if(isNaN(a)) a = 0;
      if(isNaN(b)) b = 0;
      if(isNaN(c)) c = 0;

      document.getElementById('equation').innerHTML =
        `y = ${a}x² + ${b}x + ${c}`;

      const data = generatePoints(a,b,c);

      if(chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {

        type: 'scatter',

        data: {
          datasets: [{
            label: 'Quadratic Graph',
            data: data,
            showLine: true,
            tension: 0.2
          }]
        },

        options: {

          responsive: true,

          scales: {

            x: {
              type: 'linear',
              min: -20,
              max: 20,
              title: {
                display: true,
                text: 'x-axis'
              }
            },

            y: {
              title: {
                display: true,
                text: 'y-axis'
              }
            }

          }

        }

      });

    }

    drawGraph();

  </script>

</body>
</html>
